# Config de la recolección de métricas para Escenario 3 (DoS — Colapso Controlado).

scenario: esc3

pi:
  host: 127.0.0.1   # la recolección corre EN el Pi (SSH a sí mismo); requiere self-authorized key
  user: raspberry1
  # password se lee de PI_PASS
  containers:
    - esc3-nodered    # dashboard + orquestador
    - esc3-target     # servidor Flask víctima (5000)
    - esc3-attacker   # generador asyncio
    - esc3-proxy      # nginx rate-limiter (fase protección)
  remote_metrics_dir: /home/raspberry1/tesis_metrics
  scenario_metrics_out: /home/raspberry1/tesis_escenario3/metrics_out
  sample_interval_s: 1.0

router:
  host: 192.168.1.1
  user: root
  wifi_iface: phy1-ap0
  lan_iface: br-lan
  interval_s: 5.0
