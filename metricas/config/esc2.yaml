# Config de la recolección de métricas para Escenario 2 (phishing simulado Mu1ticines).

scenario: esc2

pi:
  host: 127.0.0.1   # la recolección corre EN el Pi (SSH a sí mismo); requiere self-authorized key
  user: raspberry1
  # password se lee de la variable de entorno PI_PASS
  containers:
    - jp-esc2-nodered
  remote_metrics_dir: /home/raspberry1/tesis_metrics
  scenario_metrics_out: /home/raspberry1/tesis_escenario2/metrics_out
  sample_interval_s: 1.0

router:
  host: 192.168.1.1
  user: root
  # password se lee de ROUTER_PASS env var
  wifi_iface: phy1-ap0  # AP 2.4 GHz (OpenWrt moderno)
  lan_iface: br-lan
  interval_s: 5.0
