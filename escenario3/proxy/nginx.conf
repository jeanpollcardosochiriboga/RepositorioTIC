# Zona de rate limiting: identificada por IP origen, 10 MB de memoria
# rate=1r/s + burst=2 nodelay → target (capacidad ~5 r/s con sleep 0.2s) sobrevive con margen
limit_req_zone $binary_remote_addr zone=dos_protection:10m rate=1r/s;

server {
    listen 8080;
    server_name _;

    location / {
        # Burst pequeño sin encolar: excedentes reciben 429 inmediatamente
        limit_req zone=dos_protection burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://esc3-target:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
    }
}
